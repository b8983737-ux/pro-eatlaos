<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EATLAOS</title>
<style>html,body{margin:0;height:100%;background:#0c0906}</style>
<script>
/* EATLAOS clean-URL router (GitHub Pages): map pretty paths -> the app, then the app tidies the bar back to the pretty path. */
(function(){
  try{
    var p = location.pathname.replace(/\/+$/,''); var pl = p.toLowerCase(); var to;
    if(pl==='/book' || pl==='/booking')                         to='/app/?book=1';
    else if(pl==='/my-booking'||pl==='/mybooking'||pl==='/check-booking') to='/app/?checkbooking=1';
    else if(pl==='/login' || pl==='/owner')                     to='/app/?login=owner';
    else if(pl.indexOf('/r/')===0){ var id=decodeURIComponent(p.slice(3)); to=id?('/app/?r='+encodeURIComponent(id)):'/'; }
    else to='/';   /* unknown path -> landing */
    location.replace(to + location.hash);
  }catch(e){ location.replace('/'); }
})();
</script>
</head><body></body></html>
